<!DOCTYPE html>
<html>
<head>
  <title>Byoky E2E Test Page</title>
  <script type="importmap">
    {
      "imports": {
        "@byoky/core": "/core/index.js",
        "@byoky/sdk": "/sdk/index.js"
      }
    }
  </script>
</head>
<body>
  <h1>Byoky E2E Test Page</h1>
  <p>Status: <span id="status">Not connected</span></p>
  <p>Session: <span id="session-key">—</span></p>
  <p>Response: <span id="response">—</span></p>
  <p>Usage: <span id="usage">—</span></p>

  <button id="connect">Connect Wallet</button>
  <button id="send-request" disabled>Send Request</button>
  <button id="send-openai" disabled>Send OpenAI</button>
  <button id="send-missing" disabled>Send Missing Provider</button>
  <button id="check-usage" disabled>Check Usage</button>
  <button id="check-connected" disabled>Check Connected</button>
  <button id="disconnect" disabled>Disconnect</button>

  <script type="module">
    import { Byoky } from '@byoky/sdk';

    window._testState = {
      connected: false,
      session: null,
      response: null,
      usage: null,
      error: null,
      lastError: null,
      disconnectedByWallet: false,
      isConnectedResult: null,
      proxyError: null,
    };

    const byoky = new Byoky({ timeout: 120_000 });
    let session = null;

    function enableButtons() {
      document.getElementById('send-request').disabled = false;
      document.getElementById('send-openai').disabled = false;
      document.getElementById('send-missing').disabled = false;
      document.getElementById('check-usage').disabled = false;
      document.getElementById('check-connected').disabled = false;
      document.getElementById('disconnect').disabled = false;
      document.getElementById('connect').disabled = true;
    }

    function disableButtons() {
      document.getElementById('send-request').disabled = true;
      document.getElementById('send-openai').disabled = true;
      document.getElementById('send-missing').disabled = true;
      document.getElementById('check-usage').disabled = true;
      document.getElementById('check-connected').disabled = true;
      document.getElementById('disconnect').disabled = true;
      document.getElementById('connect').disabled = false;
    }

    document.getElementById('connect').addEventListener('click', async () => {
      try {
        window._testState.error = null;
        window._testState.lastError = null;
        window._testState.disconnectedByWallet = false;
        document.getElementById('status').textContent = 'Connecting...';
        session = await byoky.connect({
          providers: [{ id: 'anthropic', required: false }],
        });

        window._testState.connected = true;
        window._testState.session = {
          sessionKey: session.sessionKey,
          providers: session.providers,
        };

        session.onDisconnect(() => {
          window._testState.connected = false;
          window._testState.disconnectedByWallet = true;
          session = null;
          document.getElementById('status').textContent = 'Disconnected by wallet';
          disableButtons();
        });

        document.getElementById('status').textContent = 'Connected';
        document.getElementById('session-key').textContent = session.sessionKey.slice(0, 16) + '...';
        enableButtons();
      } catch (e) {
        window._testState.error = e.message;
        window._testState.lastError = { code: e.code, message: e.message };
        document.getElementById('status').textContent = 'Error: ' + e.message;
      }
    });

    document.getElementById('send-request').addEventListener('click', async () => {
      if (!session) return;
      window._testState.response = null;
      window._testState.proxyError = null;
      try {
        const proxyFetch = session.createFetch('anthropic');
        const response = await proxyFetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'anthropic-version': '2023-06-01',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1024,
            messages: [{ role: 'user', content: 'Hello from E2E test!' }],
          }),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          window._testState.proxyError = {
            status: response.status,
            code: errData.error?.code ?? errData.code,
            message: errData.error?.message ?? errData.message,
          };
          document.getElementById('response').textContent = 'Error ' + response.status + ': ' + (errData.message || errData.code);
          return;
        }

        const data = await response.json();
        window._testState.response = data;
        document.getElementById('response').textContent = JSON.stringify(data.content?.[0]?.text ?? data);
      } catch (e) {
        window._testState.proxyError = { message: e.message };
        document.getElementById('response').textContent = 'Error: ' + e.message;
      }
    });

    document.getElementById('send-openai').addEventListener('click', async () => {
      if (!session) return;
      window._testState.response = null;
      window._testState.proxyError = null;
      try {
        const proxyFetch = session.createFetch('openai');
        const response = await proxyFetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 1024,
            messages: [{ role: 'user', content: 'Hello from OpenAI E2E test!' }],
          }),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          window._testState.proxyError = {
            status: response.status,
            code: errData.error?.code ?? errData.code,
            message: errData.error?.message ?? errData.message,
          };
          return;
        }
        const data = await response.json();
        window._testState.response = data;
      } catch (e) {
        window._testState.proxyError = { message: e.message };
      }
    });

    document.getElementById('send-missing').addEventListener('click', async () => {
      if (!session) return;
      window._testState.response = null;
      window._testState.proxyError = null;
      try {
        const proxyFetch = session.createFetch('gemini');
        const response = await proxyFetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: 'Hello' }] }] }),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          window._testState.proxyError = {
            status: response.status,
            code: errData.error?.code ?? errData.code,
            message: errData.error?.message ?? errData.message,
          };
          return;
        }
        const data = await response.json();
        window._testState.response = data;
      } catch (e) {
        window._testState.proxyError = { message: e.message };
      }
    });

    document.getElementById('check-usage').addEventListener('click', async () => {
      if (!session) return;
      try {
        const usage = await session.getUsage();
        window._testState.usage = usage;
        document.getElementById('usage').textContent = JSON.stringify(usage);
      } catch (e) {
        window._testState.error = e.message;
        document.getElementById('usage').textContent = 'Error: ' + e.message;
      }
    });

    document.getElementById('check-connected').addEventListener('click', async () => {
      if (!session) return;
      try {
        const result = await session.isConnected();
        window._testState.isConnectedResult = result;
      } catch (e) {
        window._testState.isConnectedResult = false;
      }
    });

    document.getElementById('disconnect').addEventListener('click', () => {
      if (!session) return;
      session.disconnect();
      window._testState.connected = false;
      session = null;
      document.getElementById('status').textContent = 'Disconnected';
      disableButtons();
    });
  </script>
</body>
</html>
