appId: com.byoky.app
---
# Requires env: PROVIDER_NAME, API_KEY, API_KEY_FIELD_INDEX
#
# Assumes we're on the Wallet tab (main screen). Opens Add menu, picks
# the provider, lets the app auto-fill the Label field from the
# provider name, fills the API key, saves.
- tapOn:
    text: "Wallet"
    index: 0
# Empty-state "Add API Key" button exists only before first credential;
# the top-bar Add (+) icon works in both states, so use it consistently.
# Matched via content description ("Add" on the AddCircle icon).
- tapOn: "Add"
- tapOn: "Add credential"
- assertVisible: "Add API Key"
- scrollUntilVisible:
    element:
      text: ${PROVIDER_NAME}
    direction: DOWN
    timeout: 5000
- tapOn: ${PROVIDER_NAME}
# Second "API Key" text in the sheet: index 0 is the Anthropic-only
# "API Key" FilterChip; index 1 is the OutlinedTextField label. For
# providers without the FilterChip (OpenAI, Gemini), index 0 is the
# OutlinedTextField.
- scrollUntilVisible:
    element:
      text: "API Key"
      index: ${API_KEY_FIELD_INDEX}
    direction: DOWN
    timeout: 5000
- tapOn:
    text: "API Key"
    index: ${API_KEY_FIELD_INDEX}
- inputText: ${API_KEY}
- hideKeyboard
- scrollUntilVisible:
    element:
      text: "Save"
    direction: DOWN
    timeout: 5000
- tapOn: "Save"
# Saved credential appears on the Wallet screen under the provider
# name (which is what the empty Label field auto-fills to).
- assertVisible: ${PROVIDER_NAME}
