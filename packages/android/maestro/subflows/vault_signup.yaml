appId: com.byoky.app
---
# Requires env: VAULT_USERNAME, VAULT_PASSWORD
#
# Welcome → Create account → VaultAuthContent (signup mode) → fill
# username (waits for availability check) → fill password → Create
# account → MainScreen.
- assertVisible: "Byoky Wallet"
- tapOn: "Create account"
- assertVisible: "Create your account"
- tapOn: "Choose a username"
- inputText: ${VAULT_USERNAME}
# Availability check is debounced 400ms; wait for the AVAILABLE state.
- extendedWaitUntil:
    visible: "Available"
    timeout: 10000
- tapOn:
    text: "At least 12 characters"
- inputText: ${VAULT_PASSWORD}
- hideKeyboard
- tapOn: "Create account"
# Landing on MainScreen → Wallet tab → empty state, vault enabled.
- extendedWaitUntil:
    visible: "No credentials or gifts"
    timeout: 15000
