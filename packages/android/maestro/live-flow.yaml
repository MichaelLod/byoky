appId: com.byoky.app
name: live-flow
tags:
  - e2e
---
# Mirrors e2e/tests/live-flow.spec.ts for the Android app.
#
# Coverage:
#   1. Onboarding → create offline wallet with master password
#   2. Add 3 credentials: Anthropic, OpenAI, Google Gemini
#   3. Assert wallet shows "3 credentials"
#   4. Create a gift from the first credential
#   5. Revoke the gift
#   6. Lock the wallet
#
# Environment:
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY must be exported
#   (or passed via `maestro test -e KEY=...`). The real API-call path is
#   covered by ProxyServiceLiveFlowTest.kt — this flow only seeds the UI
#   with plausible key strings, so dummy values work if you just want to
#   smoke-test the UI without env vars.

- runFlow:
    file: subflows/reset_and_launch.yaml

- runFlow:
    file: subflows/create_wallet_offline.yaml
    env:
      PASSWORD: "TestPassword123!long"

- runFlow:
    file: subflows/add_credential.yaml
    env:
      PROVIDER_NAME: "Anthropic"
      API_KEY: ${ANTHROPIC_API_KEY}
      # Anthropic shows an extra "API Key" FilterChip (index 0) above
      # the text field (index 1).
      API_KEY_FIELD_INDEX: "1"

- runFlow:
    file: subflows/add_credential.yaml
    env:
      PROVIDER_NAME: "OpenAI"
      API_KEY: ${OPENAI_API_KEY}
      API_KEY_FIELD_INDEX: "0"

- runFlow:
    file: subflows/add_credential.yaml
    env:
      PROVIDER_NAME: "Google Gemini"
      API_KEY: ${GEMINI_API_KEY}
      API_KEY_FIELD_INDEX: "0"

- tapOn:
    text: "Wallet"
    index: 0
- assertVisible: "3 credentials"
- assertVisible: "Anthropic"
- assertVisible: "OpenAI"
- assertVisible: "Google Gemini"

- runFlow:
    file: subflows/create_gift.yaml

- runFlow:
    file: subflows/revoke_gift.yaml

- runFlow:
    file: subflows/lock_wallet.yaml
