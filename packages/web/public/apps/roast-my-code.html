<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="miniapp" content='{"name":"Roast My Code","description":"Paste your code and get a brutally honest but funny code review","author":"byoky","providers":["anthropic"]}'>
<title>Roast My Code</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    background: #0a0a0a;
    color: #ededed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 780px;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .header {
    text-align: center;
    padding-bottom: 0.5rem;
  }

  .header h1 {
    font-size: 1.75rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ef4444, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  .header p {
    color: #737373;
    font-size: 0.8rem;
    margin-top: 0.35rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 1.25rem;
  }

  .card label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #737373;
    margin-bottom: 0.6rem;
  }

  textarea {
    width: 100%;
    min-height: 220px;
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #ededed;
    font-family: inherit;
    font-size: 0.85rem;
    line-height: 1.6;
    padding: 1rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: #ef4444;
  }

  textarea::placeholder {
    color: #404040;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .heat-selector {
    display: flex;
    gap: 0;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .heat-btn {
    background: #0a0a0a;
    border: none;
    color: #737373;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.8rem;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid #2a2a2a;
  }

  .heat-btn:last-child {
    border-right: none;
  }

  .heat-btn:hover {
    background: #1a1a1a;
  }

  .heat-btn.active {
    color: #ededed;
    font-weight: 600;
  }

  .heat-btn.active[data-heat="mild"] {
    background: #1c1917;
    color: #fbbf24;
  }

  .heat-btn.active[data-heat="medium"] {
    background: #1a0f0a;
    color: #f97316;
  }

  .heat-btn.active[data-heat="spicy"] {
    background: #1a0a0a;
    color: #ef4444;
  }

  .roast-btn {
    flex: 1;
    min-width: 160px;
    background: linear-gradient(135deg, #ef4444, #f97316);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 0.65rem 1.5rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .roast-btn:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .roast-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .roast-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .output-card {
    display: none;
  }

  .output-card.visible {
    display: block;
  }

  .output {
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 1.25rem;
    min-height: 80px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.9rem;
    line-height: 1.7;
    color: #d4d4d4;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .output .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #ef4444;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
    margin-left: 1px;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .flame-bar {
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #ef4444, #f97316, #fbbf24);
    margin-bottom: 0.75rem;
    animation: flame-pulse 2s ease-in-out infinite;
    display: none;
  }

  .flame-bar.active {
    display: block;
  }

  @keyframes flame-pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .error {
    color: #ef4444;
    font-size: 0.85rem;
    padding: 0.75rem 1rem;
    background: #1a0a0a;
    border: 1px solid #2a1515;
    border-radius: 8px;
    display: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .error.visible {
    display: block;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Roast My Code</h1>
    <p>Paste your code below and brace yourself for the truth</p>
  </div>

  <div class="card">
    <label>Your Code</label>
    <textarea id="codeInput" placeholder="Paste your code here... if you dare"></textarea>
  </div>

  <div class="controls">
    <div class="heat-selector">
      <button class="heat-btn" data-heat="mild">Mild</button>
      <button class="heat-btn active" data-heat="medium">Medium</button>
      <button class="heat-btn" data-heat="spicy">Extra Spicy</button>
    </div>
    <button class="roast-btn" id="roastBtn">Roast It</button>
  </div>

  <div id="errorBox" class="error"></div>

  <div id="outputCard" class="card output-card">
    <label>The Roast</label>
    <div class="flame-bar" id="flameBar"></div>
    <div class="output" id="output"></div>
  </div>
</div>

<script>
(function() {
  let sessionResolve;
  const sessionReady = new Promise(r => { sessionResolve = r; });
  let providers = {};
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'BYOKY_SESSION') { providers = e.data.providers || {}; sessionResolve(e.data); }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE') { const p = pending.get(e.data.requestId); if (p) { pending.delete(e.data.requestId); p.resolve(e.data); } }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_START') { const p = pending.get(e.data.requestId); if (p && p.onStart) p.onStart(e.data); }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_CHUNK') { const p = pending.get(e.data.requestId); if (p && p.onChunk) p.onChunk(e.data.chunk); }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_END') { const p = pending.get(e.data.requestId); if (p) { pending.delete(e.data.requestId); if (p.onEnd) p.onEnd(); } }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_ERROR') { const p = pending.get(e.data.requestId); if (p) { pending.delete(e.data.requestId); p.reject(new Error(e.data.error)); } }
  });
  window.parent.postMessage({ type: 'MINIAPP_READY' }, '*');
  let reqId = 0;
  const pending = new Map();
  window.byoky = {
    sessionReady,
    get providers() { return providers; },
    async fetch(provider, url, options) { await sessionReady; options = options || {}; const id = String(++reqId); return new Promise((resolve, reject) => { pending.set(id, { resolve: (d) => resolve(new Response(d.body, { status: d.status, statusText: d.statusText, headers: d.headers || {} })), reject }); window.parent.postMessage({ type: 'BYOKY_API_REQUEST', requestId: id, provider, url, method: options.method || 'POST', headers: options.headers || {}, body: options.body || null }, '*'); }); },
    async fetchStream(provider, url, options) { await sessionReady; options = options || {}; const id = String(++reqId); return new Promise((resolve, reject) => { const { readable, writable } = new TransformStream(); const writer = writable.getWriter(); const encoder = new TextEncoder(); pending.set(id, { onStart: (d) => resolve(new Response(readable, { status: d.status, statusText: d.statusText, headers: d.headers || {} })), onChunk: (chunk) => { writer.write(encoder.encode(chunk)).catch(() => {}); }, onEnd: () => { writer.close().catch(() => {}); }, reject: (err) => { writer.abort(err).catch(() => {}); reject(err); } }); window.parent.postMessage({ type: 'BYOKY_API_REQUEST', requestId: id, provider, url, method: options.method || 'POST', headers: options.headers || {}, body: options.body || null, stream: true }, '*'); }); }
  };
})();
</script>

<script>
(function() {
  const codeInput = document.getElementById('codeInput');
  const roastBtn = document.getElementById('roastBtn');
  const outputCard = document.getElementById('outputCard');
  const output = document.getElementById('output');
  const flameBar = document.getElementById('flameBar');
  const errorBox = document.getElementById('errorBox');
  const heatBtns = document.querySelectorAll('.heat-btn');

  let currentHeat = 'medium';
  let isStreaming = false;

  const systemPrompts = {
    mild: 'You are a friendly code reviewer with a good sense of humor. Give constructive feedback with light jokes.',
    medium: 'You are a sarcastic code reviewer. Point out issues with witty commentary and developer humor.',
    spicy: 'You are a savage code roaster. Absolutely demolish this code with the most brutal, hilarious roast possible. Be mean but funny. Still point out real issues.'
  };

  heatBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (isStreaming) return;
      heatBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentHeat = btn.dataset.heat;
    });
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('visible');
  }

  function hideError() {
    errorBox.classList.remove('visible');
  }

  roastBtn.addEventListener('click', async () => {
    if (isStreaming) return;

    const code = codeInput.value.trim();
    if (!code) {
      showError('Paste some code first. We need something to roast.');
      return;
    }

    hideError();
    isStreaming = true;
    roastBtn.disabled = true;
    roastBtn.textContent = 'Roasting...';
    outputCard.classList.add('visible');
    output.innerHTML = '<span class="cursor"></span>';
    flameBar.classList.add('active');

    try {
      const response = await window.byoky.fetchStream('anthropic', 'https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          stream: true,
          messages: [
            { role: 'user', content: systemPrompts[currentHeat] + '\n\nRoast this code:\n\n```\n' + code + '\n```' }
          ]
        })
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;

          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta && parsed.delta.type === 'text_delta') {
              fullText += parsed.delta.text;
              output.innerHTML = escapeHtml(fullText) + '<span class="cursor"></span>';
              output.scrollTop = output.scrollHeight;
            }
          } catch {}
        }
      }

      output.innerHTML = escapeHtml(fullText);
    } catch (err) {
      showError('Roast failed: ' + err.message);
    } finally {
      isStreaming = false;
      roastBtn.disabled = false;
      roastBtn.textContent = 'Roast It';
      flameBar.classList.remove('active');
    }
  });

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
})();
</script>

</body>
</html>
