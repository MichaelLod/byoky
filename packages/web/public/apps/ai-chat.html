<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="miniapp" content='{"name":"AI Chat","description":"Simple multi-turn chat with Claude","author":"byoky","providers":["anthropic"]}'>
<title>AI Chat</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #ededed;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 800px;
    margin: 0 auto;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  #header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  #new-chat-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  #new-chat-btn:hover {
    border-color: #444;
    color: #ededed;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  #messages::-webkit-scrollbar-thumb:hover { background: #444; }

  .message {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    margin-top: 2px;
  }

  .message.user .message-avatar {
    background: #0ea5e9;
    color: #fff;
  }

  .message.assistant .message-avatar {
    background: #2a2a2a;
    color: #ededed;
  }

  .message-content {
    flex: 1;
    min-width: 0;
  }

  .message-role {
    font-size: 12px;
    font-weight: 600;
    color: #888;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .message-text {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px 16px;
    word-wrap: break-word;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }

  .message.user .message-text {
    background: #0c1f2e;
    border-color: #153a54;
  }

  .message-text code {
    background: #1e1e1e;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
  }

  .message-text pre {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  .message-text pre code {
    background: none;
    padding: 0;
  }

  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: #888;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  #empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 14px;
    text-align: center;
    padding: 40px;
    line-height: 1.8;
  }

  #input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  #input-wrapper {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.15s;
  }

  #input-wrapper:focus-within {
    border-color: #0ea5e9;
  }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #ededed;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    max-height: 160px;
    min-height: 24px;
  }

  #input::placeholder { color: #555; }

  #send-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #0ea5e9;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  #send-btn:hover { background: #0c8dca; }

  #send-btn:disabled {
    background: #2a2a2a;
    cursor: not-allowed;
  }

  #send-btn svg {
    width: 18px;
    height: 18px;
    fill: #fff;
  }

  #send-btn:disabled svg { fill: #555; }

  .error-msg {
    color: #ef4444;
    background: #1a0a0a;
    border: 1px solid #3a1515;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 20px;
  }

  #hint {
    text-align: center;
    font-size: 11px;
    color: #444;
    margin-top: 6px;
  }

  @media (max-width: 600px) {
    #messages { padding: 12px; }
    #input-area { padding: 8px 12px 12px; }
    .message { gap: 8px; }
    .message-text { padding: 10px 12px; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1>AI Chat</h1>
    <button id="new-chat-btn">New Chat</button>
  </div>
  <div id="messages">
    <div id="empty-state">Start a conversation with Claude.</div>
  </div>
  <div id="input-area">
    <div id="input-wrapper">
      <textarea id="input" placeholder="Message Claude..." rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div id="hint">Ctrl+Enter to send</div>
  </div>
</div>

<script>
(function() {
  let sessionResolve;
  const sessionReady = new Promise(r => { sessionResolve = r; });
  let providers = {};

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'BYOKY_SESSION') {
      providers = e.data.providers || {};
      sessionResolve(e.data);
    }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE') {
      const p = pending.get(e.data.requestId);
      if (p) { pending.delete(e.data.requestId); p.resolve(e.data); }
    }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_START') {
      const p = pending.get(e.data.requestId);
      if (p && p.onStart) p.onStart(e.data);
    }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_CHUNK') {
      const p = pending.get(e.data.requestId);
      if (p && p.onChunk) p.onChunk(e.data.chunk);
    }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_END') {
      const p = pending.get(e.data.requestId);
      if (p) { pending.delete(e.data.requestId); if (p.onEnd) p.onEnd(); }
    }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_ERROR') {
      const p = pending.get(e.data.requestId);
      if (p) { pending.delete(e.data.requestId); p.reject(new Error(e.data.error)); }
    }
  });

  window.parent.postMessage({ type: 'MINIAPP_READY' }, '*');

  let reqId = 0;
  const pending = new Map();

  window.byoky = {
    sessionReady,
    get providers() { return providers; },
    async fetch(provider, url, options) {
      await sessionReady;
      options = options || {};
      const id = String(++reqId);
      return new Promise((resolve, reject) => {
        pending.set(id, {
          resolve: (d) => resolve(new Response(d.body, { status: d.status, statusText: d.statusText, headers: d.headers || {} })),
          reject
        });
        window.parent.postMessage({ type: 'BYOKY_API_REQUEST', requestId: id, provider, url, method: options.method || 'POST', headers: options.headers || {}, body: options.body || null }, '*');
      });
    },
    async fetchStream(provider, url, options) {
      await sessionReady;
      options = options || {};
      const id = String(++reqId);
      return new Promise((resolve, reject) => {
        const { readable, writable } = new TransformStream();
        const writer = writable.getWriter();
        const encoder = new TextEncoder();
        pending.set(id, {
          onStart: (d) => resolve(new Response(readable, { status: d.status, statusText: d.statusText, headers: d.headers || {} })),
          onChunk: (chunk) => { writer.write(encoder.encode(chunk)).catch(() => {}); },
          onEnd: () => { writer.close().catch(() => {}); },
          reject: (err) => { writer.abort(err).catch(() => {}); reject(err); }
        });
        window.parent.postMessage({ type: 'BYOKY_API_REQUEST', requestId: id, provider, url, method: options.method || 'POST', headers: options.headers || {}, body: options.body || null, stream: true }, '*');
      });
    }
  };
})();
</script>

<script>
(function() {
  const API_URL = 'https://api.anthropic.com/v1/messages';
  const MODEL = 'claude-sonnet-4-20250514';

  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const newChatBtn = document.getElementById('new-chat-btn');

  let messages = [];
  let isStreaming = false;

  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  }

  inputEl.addEventListener('input', () => {
    autoResize();
    sendBtn.disabled = !inputEl.value.trim() || isStreaming;
  });

  inputEl.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  newChatBtn.addEventListener('click', () => {
    messages = [];
    messagesEl.innerHTML = '';
    emptyState.style.display = '';
    messagesEl.appendChild(emptyState);
    inputEl.focus();
  });

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function renderMarkdown(text) {
    let html = escapeHtml(text);

    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return '<pre><code>' + code.trimEnd() + '</code></pre>';
    });

    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, '<em>$1</em>');

    return html;
  }

  function addMessage(role, text) {
    if (emptyState.parentNode) emptyState.remove();

    const msgDiv = document.createElement('div');
    msgDiv.className = 'message ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = role === 'user' ? 'Y' : 'C';

    const content = document.createElement('div');
    content.className = 'message-content';

    const roleLabel = document.createElement('div');
    roleLabel.className = 'message-role';
    roleLabel.textContent = role === 'user' ? 'You' : 'Claude';

    const textDiv = document.createElement('div');
    textDiv.className = 'message-text';
    textDiv.innerHTML = renderMarkdown(text);

    content.appendChild(roleLabel);
    content.appendChild(textDiv);
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(content);
    messagesEl.appendChild(msgDiv);
    scrollToBottom();

    return textDiv;
  }

  function addTypingIndicator() {
    if (emptyState.parentNode) emptyState.remove();

    const msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';
    msgDiv.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar';
    avatar.textContent = 'C';

    const content = document.createElement('div');
    content.className = 'message-content';

    const roleLabel = document.createElement('div');
    roleLabel.className = 'message-role';
    roleLabel.textContent = 'Claude';

    const textDiv = document.createElement('div');
    textDiv.className = 'message-text';
    textDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    content.appendChild(roleLabel);
    content.appendChild(textDiv);
    msgDiv.appendChild(avatar);
    msgDiv.appendChild(content);
    messagesEl.appendChild(msgDiv);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function showError(text) {
    const errDiv = document.createElement('div');
    errDiv.className = 'error-msg';
    errDiv.textContent = text;
    messagesEl.appendChild(errDiv);
    scrollToBottom();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    autoResize();

    addMessage('user', text);
    messages.push({ role: 'user', content: text });

    addTypingIndicator();

    try {
      const body = JSON.stringify({
        model: MODEL,
        max_tokens: 4096,
        stream: true,
        messages: messages
      });

      const response = await window.byoky.fetchStream('anthropic', API_URL, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'anthropic-version': '2023-06-01'
        },
        body: body
      });

      if (!response.ok) {
        const errText = await response.text();
        let errMsg = 'API error (' + response.status + ')';
        try {
          const errJson = JSON.parse(errText);
          if (errJson.error && errJson.error.message) errMsg = errJson.error.message;
        } catch(_) {}
        throw new Error(errMsg);
      }

      removeTypingIndicator();

      let assistantText = '';
      const textDiv = addMessage('assistant', '');

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;

          try {
            const event = JSON.parse(data);

            if (event.type === 'content_block_delta' && event.delta && event.delta.type === 'text_delta') {
              assistantText += event.delta.text;
              textDiv.innerHTML = renderMarkdown(assistantText);
              scrollToBottom();
            }

            if (event.type === 'message_stop') {
              break;
            }

            if (event.type === 'error') {
              throw new Error(event.error && event.error.message ? event.error.message : 'Stream error');
            }
          } catch (parseErr) {
            if (parseErr.message !== 'Stream error' && !parseErr.message.includes('JSON')) continue;
            if (parseErr.message !== 'Stream error') continue;
            throw parseErr;
          }
        }
      }

      if (assistantText) {
        messages.push({ role: 'assistant', content: assistantText });
      }

    } catch (err) {
      removeTypingIndicator();
      showError(err.message || 'Something went wrong');
      messages.pop();
    } finally {
      isStreaming = false;
      sendBtn.disabled = !inputEl.value.trim();
      inputEl.focus();
    }
  }

  inputEl.focus();
})();
</script>

</body>
</html>
