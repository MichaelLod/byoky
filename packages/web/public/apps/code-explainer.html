<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="miniapp" content='{"name":"Code Explainer","description":"Paste any code snippet and get a clear explanation","author":"byoky","providers":["anthropic"]}'>
<title>Code Explainer</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #ededed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header svg {
    width: 24px;
    height: 24px;
    color: #10b981;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header span {
    font-size: 13px;
    color: #6b7280;
    margin-left: auto;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .panel:first-child {
    border-right: 1px solid #2a2a2a;
  }

  .panel-header {
    padding: 12px 20px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: #141414;
  }

  .panel-header label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #9ca3af;
  }

  textarea {
    flex: 1;
    width: 100%;
    padding: 20px;
    background: #0a0a0a;
    color: #ededed;
    border: none;
    outline: none;
    resize: none;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    tab-size: 2;
  }

  textarea::placeholder {
    color: #4b5563;
  }

  .output-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    font-size: 14px;
    line-height: 1.7;
  }

  .output-area .placeholder {
    color: #4b5563;
    font-style: italic;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
  }

  .output-area .content {
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .output-area .content strong {
    color: #10b981;
    font-weight: 600;
  }

  .output-area .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #10b981;
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  button {
    padding: 8px 20px;
    background: #10b981;
    color: #0a0a0a;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  button:hover:not(:disabled) {
    opacity: 0.85;
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .error {
    color: #ef4444;
    padding: 20px;
    font-size: 14px;
  }

  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }

    .panel:first-child {
      border-right: none;
      border-bottom: 1px solid #2a2a2a;
    }
  }
</style>
</head>
<body>

<header>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 18 22 12 16 6"></polyline>
    <polyline points="8 6 2 12 8 18"></polyline>
  </svg>
  <h1>Code Explainer</h1>
  <span id="status">Connecting...</span>
</header>

<div class="container">
  <div class="panel">
    <div class="panel-header">
      <label>Code Input</label>
      <button id="explain-btn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Explain
      </button>
    </div>
    <textarea id="code-input" placeholder="Paste your code here..." spellcheck="false"></textarea>
  </div>
  <div class="panel">
    <div class="panel-header">
      <label>Explanation</label>
    </div>
    <div class="output-area" id="output">
      <div class="placeholder">Paste code on the left and click Explain</div>
    </div>
  </div>
</div>

<script>
(function() {
  let sessionResolve;
  const sessionReady = new Promise(r => { sessionResolve = r; });
  let providers = {};
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'BYOKY_SESSION') { providers = e.data.providers || {}; sessionResolve(e.data); }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE') { const p = pending.get(e.data.requestId); if (p) { pending.delete(e.data.requestId); p.resolve(e.data); } }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_START') { const p = pending.get(e.data.requestId); if (p && p.onStart) p.onStart(e.data); }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_CHUNK') { const p = pending.get(e.data.requestId); if (p && p.onChunk) p.onChunk(e.data.chunk); }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_END') { const p = pending.get(e.data.requestId); if (p) { pending.delete(e.data.requestId); if (p.onEnd) p.onEnd(); } }
    if (e.data && e.data.type === 'BYOKY_API_RESPONSE_ERROR') { const p = pending.get(e.data.requestId); if (p) { pending.delete(e.data.requestId); p.reject(new Error(e.data.error)); } }
  });
  window.parent.postMessage({ type: 'MINIAPP_READY' }, '*');
  let reqId = 0;
  const pending = new Map();
  window.byoky = {
    sessionReady,
    get providers() { return providers; },
    async fetch(provider, url, options) { await sessionReady; options = options || {}; const id = String(++reqId); return new Promise((resolve, reject) => { pending.set(id, { resolve: (d) => resolve(new Response(d.body, { status: d.status, statusText: d.statusText, headers: d.headers || {} })), reject }); window.parent.postMessage({ type: 'BYOKY_API_REQUEST', requestId: id, provider, url, method: options.method || 'POST', headers: options.headers || {}, body: options.body || null }, '*'); }); },
    async fetchStream(provider, url, options) { await sessionReady; options = options || {}; const id = String(++reqId); return new Promise((resolve, reject) => { const { readable, writable } = new TransformStream(); const writer = writable.getWriter(); const encoder = new TextEncoder(); pending.set(id, { onStart: (d) => resolve(new Response(readable, { status: d.status, statusText: d.statusText, headers: d.headers || {} })), onChunk: (chunk) => { writer.write(encoder.encode(chunk)).catch(() => {}); }, onEnd: () => { writer.close().catch(() => {}); }, reject: (err) => { writer.abort(err).catch(() => {}); reject(err); } }); window.parent.postMessage({ type: 'BYOKY_API_REQUEST', requestId: id, provider, url, method: options.method || 'POST', headers: options.headers || {}, body: options.body || null, stream: true }, '*'); }); }
  };
})();
</script>

<script>
(function() {
  const codeInput = document.getElementById('code-input');
  const explainBtn = document.getElementById('explain-btn');
  const output = document.getElementById('output');
  const status = document.getElementById('status');
  let streaming = false;

  window.byoky.sessionReady.then(() => {
    status.textContent = 'Connected';
    status.style.color = '#10b981';
    explainBtn.disabled = false;
  });

  codeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && !streaming) {
      explain();
    }
  });

  explainBtn.addEventListener('click', () => {
    if (!streaming) explain();
  });

  async function explain() {
    const code = codeInput.value.trim();
    if (!code) return;

    streaming = true;
    explainBtn.disabled = true;
    explainBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><rect x="9" y="9" width="6" height="6"/></svg> Thinking...';
    output.innerHTML = '<div class="content"><span class="cursor"></span></div>';

    const contentEl = output.querySelector('.content');
    let fullText = '';

    try {
      const response = await window.byoky.fetchStream('anthropic', 'https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4096,
          stream: true,
          messages: [
            { role: 'user', content: 'You are a code explainer. Explain the following code clearly and concisely. Break down what each part does. Use plain language.\n\nExplain this code:\n\n```\n' + code + '\n```' }
          ]
        })
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error('API error (' + response.status + '): ' + text);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') continue;

          try {
            const event = JSON.parse(data);
            if (event.type === 'content_block_delta' && event.delta && event.delta.type === 'text_delta') {
              fullText += event.delta.text;
              contentEl.innerHTML = formatText(fullText) + '<span class="cursor"></span>';
              output.scrollTop = output.scrollHeight;
            }
          } catch (_) {}
        }
      }

      contentEl.innerHTML = formatText(fullText);
    } catch (err) {
      output.innerHTML = '<div class="error">' + escapeHtml(err.message) + '</div>';
    } finally {
      streaming = false;
      explainBtn.disabled = false;
      explainBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Explain';
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function formatText(text) {
    let html = escapeHtml(text);
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/`([^`]+)`/g, '<code style="background:#1e1e1e;padding:2px 6px;border-radius:4px;font-size:12px;color:#10b981;">$1</code>');
    return html;
  }
})();
</script>

</body>
</html>
