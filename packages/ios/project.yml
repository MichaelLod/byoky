name: Byoky
options:
  bundleIdPrefix: com.byoky
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 9X22GVKZ85

targets:
  Byoky:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Byoky
    settings:
      base:
        INFOPLIST_FILE: Byoky/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.byoky.app
        CODE_SIGN_ENTITLEMENTS: Byoky/App/Byoky.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ByokySafariExtension

  ByokySafariExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SafariExtension
    settings:
      base:
        INFOPLIST_FILE: SafariExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.byoky.app.extension
        CODE_SIGN_ENTITLEMENTS: SafariExtension/SafariExtension.entitlements
        OTHER_LDFLAGS: ["-framework", "SafariServices"]

  ByokyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ByokyUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.byoky.app.uitests
        TEST_TARGET_NAME: Byoky
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Byoky

  Byoky (macOS):
    type: application
    platform: macOS
    deploymentTarget: "11.0"
    sources:
      - path: macOS
        excludes:
          - "SafariExtension-macOS-Info.plist"
          - "SafariExtension-macOS.entitlements"
    settings:
      base:
        INFOPLIST_FILE: macOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.byoky.app
        CODE_SIGN_ENTITLEMENTS: macOS/Byoky-macOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: byoky
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSMainStoryboardFile: Main
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        OTHER_LDFLAGS: ["-framework", "SafariServices", "-framework", "WebKit"]
        REGISTER_APP_GROUPS: YES
    dependencies:
      - target: ByokySafariExtension (macOS)

  ByokySafariExtension (macOS):
    type: app-extension
    platform: macOS
    deploymentTarget: "11.0"
    sources:
      - path: SafariExtension
        excludes:
          - Info.plist
          - SafariExtension.entitlements
          - Resources
      - path: SafariExtension/Resources
    settings:
      base:
        INFOPLIST_FILE: macOS/SafariExtension-macOS-Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.byoky.app.extension
        CODE_SIGN_ENTITLEMENTS: macOS/SafariExtension-macOS.entitlements
        PRODUCT_NAME: ByokySafariExtension
        OTHER_LDFLAGS: ["-framework", "SafariServices"]
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: YES

schemes:
  Byoky:
    build:
      targets:
        Byoky: all
        ByokySafariExtension: all
        ByokyUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ByokyUITests
    archive:
      config: Release
  Byoky (macOS):
    build:
      targets:
        Byoky (macOS): all
        ByokySafariExtension (macOS): all
    run:
      config: Debug
    archive:
      config: Release
