name: Byoky
options:
  bundleIdPrefix: com.byoky
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Byoky:
    type: application
    platform: iOS
    sources:
      - path: Byoky
    settings:
      base:
        INFOPLIST_FILE: Byoky/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.byoky.app
        CODE_SIGN_ENTITLEMENTS: Byoky/App/Byoky.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ByokySafariExtension

  ByokySafariExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SafariExtension
    settings:
      base:
        INFOPLIST_FILE: SafariExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.byoky.app.extension
        CODE_SIGN_ENTITLEMENTS: SafariExtension/SafariExtension.entitlements
        OTHER_LDFLAGS: ["-framework", "SafariServices"]

schemes:
  Byoky:
    build:
      targets:
        Byoky: all
        ByokySafariExtension: all
    run:
      config: Debug
    archive:
      config: Release
