<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#060610"/>
    </linearGradient>
    <linearGradient id="ring" x1="20" y1="20" x2="108" y2="108">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="letter" x1="44" y1="32" x2="80" y2="96">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="125" height="125" rx="26.5" stroke="#1a1a38" stroke-width="1"/>

  <!-- Vault ring (outer) -->
  <circle cx="64" cy="64" r="46" stroke="url(#ring)" stroke-width="2.5" fill="none" opacity="0.35"/>

  <!-- Vault ring (inner) -->
  <circle cx="64" cy="64" r="38" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.2"/>

  <!-- Neural/LLM node connections (lines from nodes to center ring) -->
  <line x1="64" y1="18" x2="64" y2="26" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="64" y1="102" x2="64" y2="110" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="18" y1="64" x2="26" y2="64" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="102" y1="64" x2="110" y2="64" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>

  <!-- Diagonal connections -->
  <line x1="28" y1="28" x2="34" y2="34" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="28" x2="94" y2="34" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="28" y1="100" x2="34" y2="94" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="100" x2="94" y2="94" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

  <!-- Vault bolt nodes (positioned like neural network nodes around the ring) -->
  <!-- Top -->
  <circle cx="64" cy="18" r="4" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="64" cy="18" r="1.5" fill="#a78bfa"/>
  <!-- Bottom -->
  <circle cx="64" cy="110" r="4" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="64" cy="110" r="1.5" fill="#a78bfa"/>
  <!-- Left -->
  <circle cx="18" cy="64" r="4" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="18" cy="64" r="1.5" fill="#a78bfa"/>
  <!-- Right -->
  <circle cx="110" cy="64" r="4" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="110" cy="64" r="1.5" fill="#a78bfa"/>

  <!-- Diagonal nodes (smaller) -->
  <circle cx="28" cy="28" r="3" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.2" opacity="0.7"/>
  <circle cx="28" cy="28" r="1" fill="#a78bfa" opacity="0.7"/>
  <circle cx="100" cy="28" r="3" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.2" opacity="0.7"/>
  <circle cx="100" cy="28" r="1" fill="#a78bfa" opacity="0.7"/>
  <circle cx="28" cy="100" r="3" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.2" opacity="0.7"/>
  <circle cx="28" cy="100" r="1" fill="#a78bfa" opacity="0.7"/>
  <circle cx="100" cy="100" r="3" fill="#0a0a18" stroke="#7c3aed" stroke-width="1.2" opacity="0.7"/>
  <circle cx="100" cy="100" r="1" fill="#a78bfa" opacity="0.7"/>

  <!-- Center "b" letter -->
  <text x="64" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="url(#letter)">b</text>

  <!-- Subtle glow behind the letter -->
  <circle cx="64" cy="64" r="24" fill="#7c3aed" opacity="0.06"/>
</svg>
