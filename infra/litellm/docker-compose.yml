# LiteLLM proxy — stateless forwarding engine behind the Byoky vault.
# No database → no key/spend store; internal-only (bound to loopback in dev).
name: byoky-litellm

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    pull_policy: always
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      # Internal hop secret for vault→LiteLLM (NOT a user/virtual key).
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-byoky-internal}
      # Optional real keys for local live testing (mock model needs none).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      # The image is python-based and has no curl; use urllib.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
