name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @byoky/core build && pnpm --filter @byoky/sdk build

      - name: Run tests
        run: pnpm test

      - name: Build extension
        run: pnpm --filter @byoky/extension build

      - name: Build landing page
        run: pnpm --filter @byoky/web build
